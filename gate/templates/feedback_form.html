<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workplace Intelligence Platform - Visit Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f9;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white shadow-2xl rounded-xl p-6 md:p-10 text-center">
        <h1 class="text-3xl font-extrabold text-blue-700 mb-2">
            Visit feedback
        </h1>
        <p class="text-gray-500 mb-6">Share your comments in the box below.</p>

        {% if error %}
        <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 text-left">
            {{ error }}
        </div>
        {% endif %}

        {% if visitor_id %}
            <p class="text-md text-gray-700 font-semibold mb-6 p-2 bg-blue-50 rounded-lg inline-block">
                Visitor ID: <span class="font-mono text-blue-600">{{ visitor_id }}</span>
            </p>
        {% endif %}

        <form method="POST" action="/submit_feedback" id="feedbackForm" class="text-left">
            {% if visitor_id %}
                <input type="hidden" name="visitor_id" value="{{ visitor_id }}">
            {% endif %}
            <label for="feedbackText" class="block text-sm font-medium text-gray-700 mb-2">Your feedback</label>
            <textarea id="feedbackText" name="feedback_text" rows="6" required
                  class="w-full mb-6 p-4 border-2 border-gray-200 rounded-xl text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-y"
                  placeholder="How was your visit? (Required)"></textarea>
            <div class="text-center">
                <button type="submit"
                        class="w-full sm:w-auto px-10 py-3 bg-blue-600 text-white font-bold text-lg rounded-lg shadow-xl hover:bg-blue-700 transition duration-300 transform hover:-translate-y-0.5">
                    Submit Feedback
                </button>
            </div>
        </form>
    </div>
</body>
</html>
